<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TONNDA Premium Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Базовые переменные TG с фоллбэком на темную премиум-тему */
            --bg: var(--tg-theme-bg-color, #09090b);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #a1a1aa);

            /* Кастомные акценты */
            --accent-color: #6366f1;
            /* Индиго */
            --accent-glow: rgba(99, 102, 241, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-border-active: rgba(99, 102, 241, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", Roboto, sans-serif;
            background-color: var(--bg);
            /* Радиальное фоновое свечение */
            background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.15), transparent 400px),
                radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.1), transparent 400px);
            background-attachment: fixed;
            color: var(--text);
            padding: 24px 20px 100px 20px;
            min-height: 100vh;
        }

        /* Анимация появления */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            margin-bottom: 40px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .dev-badge {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--hint);
            font-size: 15px;
            line-height: 1.5;
        }

        .catalog {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Задержка появления для карточек */
        .card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .card.active {
            background: rgba(99, 102, 241, 0.08);
            border-color: var(--card-border-active);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
        }

        .icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text);
        }

        .card.active .icon-wrap {
            background: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .info {
            flex-grow: 1;
            padding-right: 12px;
        }

        .title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .desc {
            font-size: 13px;
            color: var(--hint);
            line-height: 1.4;
        }

        .action {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .price {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card.active .btn {
            background: var(--text);
            color: var(--bg);
            border-color: transparent;
        }
    </style>
</head>

<body>

    <header>
        <div class="dev-badge">Tonnda Dev</div>
        <h1>Digital<br>Solutions</h1>
        <p>Premium automation for your business.</p>
    </header>

    <div class="catalog">

        <div class="card" id="item1">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                    <circle cx="12" cy="5" r="2"></circle>
                    <path d="M12 7v4"></path>
                    <line x1="8" y1="16" x2="8" y2="16"></line>
                    <line x1="16" y1="16" x2="16" y2="16"></line>
                </svg>
            </div>
            <div class="info">
                <div class="title">B2B Автоматизация</div>
                <div class="desc">Telegram-бот для учета логистики и базы данных.</div>
            </div>
            <div class="action">
                <div class="price">15 000 ₽</div>
                <button class="btn" onclick="toggle(1, 'B2B Автоматизация', 15000)">Добавить</button>
            </div>
        </div>

        <div class="card" id="item2">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                    <rect x="9" y="9" width="6" height="6"></rect>
                    <line x1="9" y1="1" x2="9" y2="4"></line>
                    <line x1="15" y1="1" x2="15" y2="4"></line>
                    <line x1="9" y1="20" x2="9" y2="23"></line>
                    <line x1="15" y1="20" x2="15" y2="23"></line>
                    <line x1="20" y1="9" x2="23" y2="9"></line>
                    <line x1="20" y1="14" x2="23" y2="14"></line>
                    <line x1="1" y1="9" x2="4" y2="9"></line>
                    <line x1="1" y1="14" x2="4" y2="14"></line>
                </svg>
            </div>
            <div class="info">
                <div class="title">Web App Магазин</div>
                <div class="desc">Интерактивный UI с корзиной внутри Telegram.</div>
            </div>
            <div class="action">
                <div class="price">25 000 ₽</div>
                <button class="btn" onclick="toggle(2, 'Web App Магазин', 25000)">Добавить</button>
            </div>
        </div>

        <div class="card" id="item3">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
            </div>
            <div class="info">
                <div class="title">Discord Интеграция</div>
                <div class="desc">Связка игрового сервера (Java) с Discord.</div>
            </div>
            <div class="action">
                <div class="price">10 000 ₽</div>
                <button class="btn" onclick="toggle(3, 'Discord Интеграция', 10000)">Добавить</button>
            </div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Форсируем темную тему для премиум вида, если у юзера светлая
        tg.setHeaderColor('#09090b');
        tg.setBackgroundColor('#09090b');

        let cart = [];

        function toggle(id, name, price) {
            const card = document.getElementById(`item${id}`);
            const btn = card.querySelector('.btn');
            const index = cart.findIndex(i => i.id === id);

            if (index > -1) {
                cart.splice(index, 1);
                card.classList.remove('active');
                btn.innerText = "Добавить";
                tg.HapticFeedback.impactOccurred('light');
            } else {
                cart.push({ id, name, price });
                card.classList.add('active');
                btn.innerText = "Убрать";
                tg.HapticFeedback.impactOccurred('medium');
            }

            updateButton();
        }

        function updateButton() {
            if (cart.length === 0) {
                tg.MainButton.hide();
            } else {
                let total = cart.reduce((s, i) => s + i.price, 0);
                tg.MainButton.text = `ОФОРМИТЬ • ${total.toLocaleString('ru-RU')} ₽`;
                tg.MainButton.color = '#6366f1';
                tg.MainButton.textColor = '#ffffff';
                tg.MainButton.show();
            }
        }

        Telegram.WebApp.onEvent('mainButtonClicked', function () {
            let items = cart.map(i => `🔸 ${i.name}`).join('\n');
            tg.sendData(`🚀 Запрос на разработку:\n\n${items}`);
        });
    </script>
</body>

</html>
