<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TONNDA Premium Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="dev-badge">Tonnda Dev</div>
        <h1>Digital<br>Solutions</h1>
        <p>Premium automation for your business.</p>
    </header>

    <div class="tabs" id="tabs-container">
        <button class="tab active" data-category="all">Все</button>
        <button class="tab" data-category="tg">Telegram</button>
        <button class="tab" data-category="game">Game Dev</button>
    </div>

    <div class="catalog" id="catalog"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-drag-pill"></div>
            <div class="modal-icon" id="modal-icon"></div>
            <h2 id="modal-title">Название</h2>
            <p id="modal-desc">Описание</p>
            <div class="tech-stack" id="modal-stack">
            </div>
            <button class="btn-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
