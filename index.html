<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TONNDA Premium Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="dev-badge">Tonnda Dev</div>
        <h1>Digital<br>Solutions</h1>
        <p>Premium automation for your business.</p>
    </header>

    <div class="search-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Поиск услуг...">
    </div>

    <div class="tabs" id="tabs-container">
        <button class="tab active" data-category="all">Все</button>
        <button class="tab" data-category="tg">Telegram</button>
        <button class="tab" data-category="game">Game Dev</button>
    </div>

    <div class="catalog" id="catalog"></div>

    <div class="promo-box" id="promo-box" style="display: none;">
        <input type="text" id="promo-input" placeholder="Промокод (введи TONNDA)">
        <button onclick="applyPromo()">Применить</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-drag-pill"></div>
            <div class="modal-icon" id="modal-icon"></div>
            <h2 id="modal-title">Название</h2>
            <p id="modal-desc">Описание</p>
            <div class="tech-stack" id="modal-stack"></div>
            <button class="btn-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
