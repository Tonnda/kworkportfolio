<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONNDA Digital Store</title>
    <!-- Подключаем скрипт Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Используем переменные цветов Telegram для интеграции с темой */
            --bg-color: var(--tg-theme-bg-color, #fff);
            --text-color: var(--tg-theme-text-color, #222);
            --hint-color: var(--tg-theme-hint-color, #999);
            --link-color: var(--tg-theme-link-color, #248bbf);
            --button-color: var(--tg-theme-button-color, #248bbf);
            --button-text-color: var(--tg-theme-button-text-color, #fff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
        }

        p {
            color: var(--hint-color);
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: grid;
            gap: 20px;
        }

        .card {
            background-color: var(--secondary-bg-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--hint-color);
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 16px;
            font-weight: bold;
            color: var(--link-color);
        }

        .btn-add {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-remove {
            background-color: #eb4034;
            color: white;
            display: none; /* Скрыта по умолчанию */
        }
    </style>
</head>
<body>

    <header>
        <h1>Цифровые услуги 🚀</h1>
        <p>Выберите нужный сервис</p>
    </header>

    <div class="container">
        <!-- Товар 1 -->
        <div class="card" id="item1">
            <div class="card-title">Бот-визитка</div>
            <div class="card-desc">Простой бот для презентации ваших услуг или компании.</div>
            <div class="card-footer">
                <span class="price">2 999 ₽</span>
                <button class="btn-add" onclick="toggleItem(1, 'Бот-визитка', 2999)">Добавить</button>
            </div>
        </div>

        <!-- Товар 2 -->
        <div class="card" id="item2">
            <div class="card-title">Магазин Web App</div>
            <div class="card-desc">Полноценный магазин внутри Telegram с корзиной.</div>
            <div class="card-footer">
                <span class="price">9 999 ₽</span>
                <button class="btn-add" onclick="toggleItem(2, 'Магазин Web App', 9999)">Добавить</button>
            </div>
        </div>

        <!-- Товар 3 -->
        <div class="card" id="item3">
            <div class="card-title">Discord бот</div>
            <div class="card-desc">Автоматизация вашего сообщества в Discord.</div>
            <div class="card-footer">
                <span class="price">4 999 ₽</span>
                <button class="btn-add" onclick="toggleItem(3, 'Discord бот', 4999)">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем приложение на все окно

        let cart = [];

        function toggleItem(id, name, price) {
            const index = cart.findIndex(i => i.id === id);
            const btn = document.querySelector(`#item${id} .btn-add`);

            if (index > -1) {
                // Удаляем из корзины
                cart.splice(index, 1);
                btn.innerText = "Добавить";
                btn.style.backgroundColor = "var(--button-color)";
            } else {
                // Добавляем в корзину
                cart.push({ id, name, price });
                btn.innerText = "Удалить";
                btn.style.backgroundColor = "#eb4034";
            }

            updateMainButton();
        }

        function updateMainButton() {
            if (cart.length === 0) {
                tg.MainButton.hide();
            } else {
                let totalPrice = cart.reduce((sum, item) => sum + item.price, 0);
                tg.MainButton.text = `Оформить заказ на ${totalPrice} ₽`;
                tg.MainButton.show();
            }
        }

        // Обработка нажатия на главную кнопку Telegram
        Telegram.WebApp.onEvent('mainButtonClicked', function() {
            let orderData = cart.map(i => `- ${i.name} (${i.price} ₽)`).join('\n');
            let total = cart.reduce((sum, i) => sum + i.price, 0);
            
            let finalString = `${orderData}\n\nИтого: ${total} ₽`;
            
            // Отправляем данные боту (работает только если Web App открыт через кнопку)
            tg.sendData(finalString);
            tg.close();
        });

        // Установка цвета хедера в тон темы
        tg.setHeaderColor('secondary_bg_color');
    </script>
</body>
</html>
